name: Deploy to AWS ASG

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. AWS 자격증명 설정
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2 # 본인의 AWS 리전

    # 2. AWS CLI로 ASG 내의 인스턴스 Public IP 동적 추출
    - name: Get ASG Instances Public IPs
      id: get-ips
      run: |
        # '내-asg-이름' 부분을 실제 AWS Auto Scaling 그룹명으로 변경하세요.
        INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
          --auto-scaling-group-names "adp-app-asg" \
          --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
          --output text)
        
        if [ -z "$INSTANCE_IDS" ]; then
          echo "현재 가동 중인 인스턴스가 없습니다."
          exit 1
        fi

        # 인스턴스 ID 목록으로 Public IP 조회
        IPS=$(aws ec2 describe-instances \
          --instance-ids $INSTANCE_IDS \
          --query "Reservations[*].Instances[*].PublicIpAddress" \
          --output text)
        
        echo "TARGET_IPS=$IPS" >> $GITHUB_ENV
        echo "조회된 IP 목록: $IPS"

    # 3. SSH Key 설정
    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        # SSH 호스트 체크 무시 설정
        echo -e "Host *\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config

    # 4. 조회된 모든 IP에 순차적으로 배포 진행
    - name: Deploy to Instances
      run: |
        for ip in ${{ env.TARGET_IPS }}; do
          echo "🚀 $ip 서버에 배포 및 서비스 재시작을 시작합니다..."
          
          # 💡 해결 포인트: 큰따옴표 대신 Heredoc(<< 'EOF') 구조를 사용하여 
          # 실제 터미널에 로그인해서 한 줄씩 치는 방식으로 명령어 순서를 보장합니다.
          ssh ${{ secrets.EC2_USER }}@$ip << 'EOF'
            # 아까 수동으로 확인했던 정확한 backend 폴더 경로로 이동
            cd /home/ec2-user/backend
            
            echo "--- [1/3] Git Pull 진행 중 ---"
            git pull
            
            echo "--- [2/3] npm 패키지 설치 중 ---"
            npm install --omit=dev
            
            echo "--- [3/3] Systemd 서비스 재시작 중 ---"
            sudo systemctl restart nodeapp
            
            echo "✅ $ip 서버에 최신 코드가 성공적으로 적용되었습니다!"
            EOF
        done
