name: Deploy to AWS ASG

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  
on:
  push:
    branches: [ main ]

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    # 1. AWS 자격증명 설정
    - name: Configure AWS credentials
      uses: aws-actions/configure-aws-credentials@v4
      with:
        aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
        aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
        aws-region: ap-northeast-2 # 본인의 AWS 리전

    # 2. AWS CLI로 ASG 내의 인스턴스 IP 동적 추출 (최종 완결판)
    - name: Get ASG Instances Public IPs
      id: get-ips
      run: |
        # 1) InService 상태인 인스턴스 ID 목록 추출 후, xargs로 공백 한 줄 정렬
        INSTANCE_IDS=$(aws autoscaling describe-auto-scaling-groups \
          --auto-scaling-group-names "adp-app-asg" \
          --query "AutoScalingGroups[0].Instances[?LifecycleState=='InService'].InstanceId" \
          --output text | xargs)
        
        echo "추출된 INSTANCE_IDS: $INSTANCE_IDS"

        if [ -z "$INSTANCE_IDS" ] || [ "$INSTANCE_IDS" = "None" ]; then
          echo "❌ 가동 중인 인스턴스 ID가 없습니다."
          exit 1
        fi

        # 2) 퍼블릭 IP 조회 시도
        IPS=$(aws ec2 describe-instances \
          --instance-ids $INSTANCE_IDS \
          --query "Reservations[*].Instances[*].PublicIpAddress" \
          --output text | xargs)
        
        # 3) 💡 [예외 처리] 만약 퍼블릭 IP가 비어있다면 프라이빗(내부) IP 조회를 시도합니다.
        if [ -z "$IPS" ] || [ "$IPS" = "None" ]; then
          echo "ℹ️ 퍼블릭 IP가 발견되지 않아 프라이빗 IP를 조회합니다..."
          IPS=$(aws ec2 describe-instances \
            --instance-ids $INSTANCE_IDS \
            --query "Reservations[*].Instances[*].PrivateIpAddress" \
            --output text | xargs)
        fi
        
        # 4) 최종 환경 변수 저장
        echo "TARGET_IPS=$IPS" >> $GITHUB_ENV
        echo "최종 조회된 IP 목록: '$IPS'"

    # 3. SSH Key 설정
    - name: Setup SSH Key
      run: |
        mkdir -p ~/.ssh
        echo "${{ secrets.AWS_SSH_KEY }}" > ~/.ssh/id_rsa
        chmod 600 ~/.ssh/id_rsa
        # SSH 호스트 체크 무시 설정
        echo -e "Host *\n\tStrictHostKeyChecking no\n" >> ~/.ssh/config

    # 4. 조회된 모든 IP에 순차적으로 배포 진행
    - name: Deploy to Instances
      run: |
        for ip in ${{ env.TARGET_IPS }}; do
          echo "🚀 $ip 서버에 배포 및 서비스 재시작을 시작합니다..."
          
          # 1) 기존 앱 폴더로 이동해 최신 코드 pull 및 빌드/디펜던시 설치
          # 2) systemctl 서비스 재시작 (서비스명 'nodeapp' 가정)
          ssh ${{ secrets.EC2_USER }}@$ip "
            cd /home/ec2-user/backend && \
            echo '--- [1/3] Git Pull 진행 중 ---' && \
            git pull && \
            echo '--- [2/3] npm 패키지 설치 중 ---' && \
            npm install --omit=dev && \
            echo '--- [3/3] Systemd 서비스 재시작 중 ---' && \
            sudo systemctl restart nodeapp && \
            echo '✅ $ip 서버 배포 성공!'
          "
        done